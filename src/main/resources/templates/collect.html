<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>我的收藏 - Java学习题库</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#4F46E5',
                        secondary: '#10B981',
                        neutral: '#1E293B',
                        light: '#334155',
                        'text-light': '#F8FAFC',
                        'text-muted': '#94A3B8',
                        'warning': '#F59E0B',
                    },
                    fontFamily: {
                        sans: ['Inter', 'system-ui', 'sans-serif'],
                    },
                    boxShadow: {
                        'card': '0 10px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.05)',
                        'hover': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04)',
                    }
                }
            }
        }
    </script>

    <style type="text/tailwindcss">
        @layer utilities {
            .content-auto {
                content-visibility: auto;
            }

            .card-hover {
                @apply transition-all duration-300 hover:shadow-hover hover:-translate-y-1;
            }

            .btn-hover {
                @apply transition-all duration-300 hover:shadow-lg transform hover:-translate-y-0.5;
            }

            .collect-btn {
                @apply transition-all duration-300 p-2 rounded-full hover:bg-primary/20 cursor-pointer;
            }

            .message-animate {
                @apply transition-all duration-300 ease-in-out;
            }
        }
    </style>
</head>

<body class="bg-gray-900 min-h-screen font-sans text-text-light flex flex-col">
<header class="bg-neutral shadow-md z-50">
    <div class="container mx-auto px-4 py-4 flex justify-between items-center">
        <div class="flex items-center space-x-3">
            <div class="bg-primary/20 p-2 rounded-lg">
                <i class="fa fa-book text-primary text-2xl"></i>
            </div>
            <h1 class="text-xl md:text-2xl font-bold text-text-light">Java学习题库</h1>
        </div>

        <div class="flex items-center space-x-6">
            <a href="/java/add/question"
               class="px-4 py-2 bg-secondary text-white rounded-lg text-sm font-medium btn-hover flex items-center">
                <i class="fa fa-plus mr-1.5"></i>新增题目
            </a>

            <div class="relative group" id="userMenu">
                <button class="flex items-center space-x-2 focus:outline-none">
                    <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center border-2 border-primary/30 transition-all group-hover:border-primary">
                        <i class="fa fa-user text-primary text-xl"></i>
                    </div>
                    <span class="text-sm font-medium hidden md:inline-block" id="usernameDisplay">加载中...</span>
                    <span class="text-sm text-text-muted hidden md:inline-block" id="realnameDisplay">（加载中...）</span>
                    <i class="fa fa-chevron-down text-xs text-text-muted transition-transform duration-200 group-hover:rotate-180"></i>
                </button>

                <div class="absolute right-0 mt-2 w-48 bg-light rounded-lg shadow-lg border border-gray-700 opacity-0 invisible group-hover:opacity-100 group-hover:visible transition-all duration-200 transform origin-top-right z-50">
                    <div class="py-2">
                        <div class="px-4 py-3 border-b border-gray-700">
                            <p class="text-sm font-medium" id="usernameInMenu">加载中...</p>
                            <p class="text-xs text-text-muted" id="realnameInMenu">--</p>
                            <p class="text-xs text-text-muted" id="userRole">未登录</p>
                        </div>
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-primary/20 transition-colors">
                            <i class="fa fa-user-circle mr-2 text-text-muted"></i>个人中心
                        </a>
                        <a href="/java/study/collect" class="block px-4 py-2 text-sm bg-primary/20 text-white font-medium">
                            <i class="fa fa-star mr-2 text-warning"></i>我的收藏
                        </a>
                        <a href="#" class="block px-4 py-2 text-sm hover:bg-primary/20 transition-colors">
                            <i class="fa fa-cog mr-2 text-text-muted"></i>设置
                        </a>
                        <a id="loginLogoutLink" href="/java/login"
                           class="block px-4 py-2 text-sm hover:bg-primary/20 transition-colors">
                            <i class="fa fa-sign-out mr-2 text-text-muted"></i>登录
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</header>

<main class="flex-1 overflow-y-auto bg-gray-900/50">
    <div class="container mx-auto px-4 py-6 md:py-10">
        <div class="max-w-4xl mx-auto">
            <!-- 页面标题 -->
            <div class="flex items-center justify-between mb-8">
                <div class="flex items-center">
                    <div class="bg-warning/20 p-3 rounded-lg mr-4">
                        <i class="fa fa-star text-warning text-2xl"></i>
                    </div>
                    <div>
                        <h2 class="text-2xl md:text-3xl font-bold text-white">我的收藏</h2>
                        <p class="text-text-muted text-sm mt-1">已收藏 <span id="collectedCount" class="text-warning font-medium">0</span> 道题目</p>
                    </div>
                </div>
                <a href="/java/study" class="px-4 py-2 bg-primary/20 text-primary rounded-lg text-sm font-medium btn-hover flex items-center">
                    <i class="fa fa-arrow-left mr-1.5"></i>返回题库
                </a>
            </div>

            <!-- 消息提示 -->
            <div id="message"
                 class="hidden px-4 py-3 rounded-lg mb-6 text-center bg-gray-800 text-white message-animate opacity-0 translate-y-2">
                <i id="messageIcon" class="fa fa-info-circle mr-2"></i>
                <span id="messageText"></span>
            </div>

            <!-- 收藏题目列表 -->
            <div id="collectedQuestionsList" class="space-y-6">
                <!-- 空状态 -->
                <div id="emptyCollectionState" class="flex items-center justify-center py-16 text-text-muted">
                    <div class="text-center">
                        <i class="fa fa-star-o text-5xl mb-4 opacity-50"></i>
                        <p class="text-lg">暂无收藏的题目</p>
                        <p class="text-sm mt-2">去题库浏览并收藏你感兴趣的题目吧</p>
                        <a href="/java/study" class="inline-block mt-4 px-4 py-2 bg-primary text-white rounded-lg text-sm font-medium btn-hover">
                            前往题库
                        </a>
                    </div>
                </div>

                <!-- 收藏题目卡片（动态生成） -->
            </div>
        </div>
    </div>
</main>

<footer class="bg-neutral text-gray-400 py-6 mt-auto border-t border-gray-800">
    <div class="container mx-auto px-4 text-center text-sm">
        <div class="flex flex-col md:flex-row items-center justify-center gap-4">
            <p>© 2025 Java学习题库 | 专注Java知识练习</p>
            <div class="flex items-center space-x-4">
                <a href="#" class="hover:text-text-light transition-colors">
                    <i class="fa fa-question-circle mr-1"></i>帮助中心
                </a>
                <a href="#" class="hover:text-text-light transition-colors">
                    <i class="fa fa-file-text-o mr-1"></i>使用指南
                </a>
                <a href="#" class="hover:text-text-light transition-colors">
                    <i class="fa fa-envelope-o mr-1"></i>联系我们
                </a>
            </div>
        </div>
    </div>
</footer>

<script th:inline="javascript">
    // 后端传递的收藏题目列表（关联查询结果：collectquestion + javaquestion）
    let collectedQuestions = []; // 仅初始化空数组，后续由接口填充

    // DOM元素
    const collectedQuestionsList = document.getElementById('collectedQuestionsList');
    const emptyCollectionState = document.getElementById('emptyCollectionState');
    const collectedCount = document.getElementById('collectedCount');
    const messageElement = document.getElementById('message');
    const messageIcon = document.getElementById('messageIcon');
    const messageText = document.getElementById('messageText');
    const usernameDisplay = document.getElementById('usernameDisplay');
    const realnameDisplay = document.getElementById('realnameDisplay');
    const usernameInMenu = document.getElementById('usernameInMenu');
    const realnameInMenu = document.getElementById('realnameInMenu');
    const userRole = document.getElementById('userRole');
    const loginLogoutLink = document.getElementById('loginLogoutLink');

    document.addEventListener('DOMContentLoaded', () => {
        fetchUserInfo();
        // 注释掉原有的模板数据渲染，改为调用接口
        fetchCollectedQuestions(); // 新增：通过接口获取数据
    });

    async function fetchCollectedQuestions() {
        try {
            const response = await fetch('/java/login/collect'); // 调用收藏接口
            if (!response.ok) throw new Error(`接口请求失败，状态码：${response.status}`);
            const result = await response.json();
            if (result.code === 1 && Array.isArray(result.data)) {
                // 使用接口返回的数据渲染，覆盖模板初始数据
                collectedQuestions = result.data;
                renderCollectedQuestions(); // 用接口数据渲染
            } else {
                throw new Error('接口返回格式错误');
            }
        } catch (error) {
            console.error('获取收藏数据失败：', error);
            showMessage('加载收藏失败，请刷新页面重试', 'warning');
        }
    }
    // 获取用户信息
    async function fetchUserInfo() {
        try {
            const response = await fetch('/java/login/user');
            if (!response.ok) throw new Error(`接口请求失败，状态码：${response.status}`);
            const result = await response.json();
            if (result.code === 1 && result.data) renderUserInfo(result.data);
            else throw new Error('接口返回数据格式异常');
        } catch (error) {
            console.error('用户信息获取失败：', error);
            usernameDisplay.textContent = '未登录';
            realnameDisplay.textContent = '（请登录）';
            usernameInMenu.textContent = '未登录';
            realnameInMenu.textContent = '未登录';
            userRole.textContent = '游客';
            loginLogoutLink.innerHTML = '<i class="fa fa-sign-in mr-2"></i>登录';
            loginLogoutLink.href = '/java/login';
        }
    }

    // 渲染用户信息
    function renderUserInfo(userData) {
        usernameDisplay.textContent = userData.username || '未知用户';
        realnameDisplay.textContent = `（${userData.realname || '未设置'}）`;
        usernameInMenu.textContent = userData.username || '未知用户';
        realnameInMenu.textContent = `真实姓名：${userData.realname || '未设置'}`;
        userRole.textContent = '管理员';
        loginLogoutLink.innerHTML = '<i class="fa fa-sign-out mr-2"></i>退出';
        loginLogoutLink.href = '/java/logout';
    }

    // 渲染收藏题目列表
    function renderCollectedQuestions() {
        if (collectedQuestions.length === 0) {
            emptyCollectionState.classList.remove('hidden');
            return;
        }

        // 隐藏空状态，更新收藏数量
        emptyCollectionState.classList.add('hidden');
        collectedCount.textContent = collectedQuestions.length;
        collectedQuestionsList.innerHTML = '';

        // 遍历渲染收藏的题目
        collectedQuestions.forEach((item, index) => {
            // 格式化收藏时间（YYYY-MM-DD HH:MM）
            const formatTime = (timeStr) => {
                if (!timeStr) return '未知时间';
                const date = new Date(timeStr);
                return `${date.getFullYear()}-${(date.getMonth() + 1).toString().padStart(2, '0')}-${date.getDate().toString().padStart(2, '0')} ${date.getHours().toString().padStart(2, '0')}:${date.getMinutes().toString().padStart(2, '0')}`;
            };

            const questionCard = document.createElement('div');
            questionCard.className = 'bg-light rounded-xl shadow-card card-hover p-6 md:p-8 border border-gray-700/50';
            questionCard.innerHTML = `
                <div class="flex justify-between items-start mb-4">
                    <div class="inline-flex items-center bg-primary/90 text-white px-4 py-1.5 rounded-full text-sm font-medium">
                        <i class="fa fa-question-circle mr-2"></i>
                        收藏题目 ${index + 1}
                    </div>
                    <button class="collect-btn" data-question-id="${item.questionId}" title="取消收藏">
                        <i class="fa fa-star text-warning text-xl"></i>
                    </button>
                </div>

                <div class="mb-6">
                    <p class="text-xs text-text-muted mb-3 flex items-center">
                        <i class="fa fa-calendar-o mr-1.5"></i>收藏时间：${formatTime(item.createTime)}
                    </p>
                    <h3 class="text-xl font-semibold text-white leading-relaxed">
                        ${item.question || '题目内容加载失败'}
                    </h3>
                </div>

                <div class="flex flex-wrap justify-end items-center gap-4 pt-4 border-t border-gray-700/50">
                    <a href="/java/study?questionId=${item.questionId}" class="px-6 py-2.5 bg-primary text-white rounded-lg font-medium btn-hover flex items-center">
                        <i class="fa fa-edit mr-2"></i>去答题
                    </a>
                </div>
            `;

            collectedQuestionsList.appendChild(questionCard);
        });

        // 绑定取消收藏事件
        document.querySelectorAll('.collect-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                const questionId = e.currentTarget.dataset.questionId;
                await cancelCollection(questionId, e.currentTarget.closest('div.bg-light'));
            });
        });
    }

    // 取消收藏
    async function cancelCollection(questionId, cardElement) {
        if (!isLoggedIn()) {
            showMessage('请先登录后再进行操作', 'warning');
            return;
        }

        try {
            // 显示加载状态
            const icon = cardElement.querySelector('.collect-btn i');
            icon.classList.remove('fa-star');
            icon.classList.add('fa-spinner', 'fa-spin');

            const response = await fetch(`/java/study/collect/remove/${questionId}`, {method: 'POST'});
            if (!response.ok) throw new Error(`操作失败，状态码：${response.status}`);

            const result = await response.json();
            if (result.code === 1 && result.data?.success) {
                // 移除卡片并更新计数
                cardElement.classList.add('opacity-0', 'scale-95', 'transition-all', 'duration-300');
                setTimeout(() => cardElement.remove(), 300);

                const newCount = parseInt(collectedCount.textContent) - 1;
                collectedCount.textContent = newCount;
                showMessage('取消收藏成功', 'success');

                // 空状态处理
                if (newCount === 0) {
                    setTimeout(() => emptyCollectionState.classList.remove('hidden'), 300);
                }
            } else {
                showMessage(result.msg || '取消收藏失败', 'warning');
                icon.classList.remove('fa-spinner', 'fa-spin');
                icon.classList.add('fa-star');
            }
        } catch (error) {
            console.error('取消收藏失败：', error);
            showMessage('操作失败：' + error.message, 'warning');
        }
    }

    // 检查登录状态
    function isLoggedIn() {
        const role = userRole.textContent;
        return role !== '未登录' && role !== '游客' && role !== '';
    }

    // 显示消息提示
    function showMessage(text, type) {
        messageText.textContent = text;
        messageIcon.className = type === 'success'
            ? 'fa fa-check-circle mr-2 text-green-400'
            : 'fa fa-exclamation-circle mr-2 text-warning';
        messageElement.classList.remove('hidden', 'bg-green-600/20', 'bg-yellow-600/20');
        messageElement.classList.add(type === 'success' ? 'bg-green-600/20' : 'bg-yellow-600/20');
        setTimeout(() => messageElement.classList.remove('opacity-0', 'translate-y-2'), 50);
        setTimeout(hideMessage, 3000);
    }

    // 隐藏消息提示
    function hideMessage() {
        messageElement.classList.add('opacity-0', 'translate-y-2');
        setTimeout(() => messageElement.classList.add('hidden'), 300);
    }
</script>
</body>
</html>
